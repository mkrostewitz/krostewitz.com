[build]
  command = "npm run build"
  publish = ".next"

[functions]
  directory = "netlify/functions"

[functions."linkedin-scheduler"]
  schedule = "* * * * *"

[build.environment]
  # Preserves scanner exceptions for deployment-provided environment keys.
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_MAPBOX_TOKEN,APPLE_MAIL_APP_PASSWORD,APPLE_MAIL_FROM,APPLE_MAIL_TO,APPLE_MAIL_USER,DO_SPACES_UPLOAD_PREFIX,AUTH_BASE_URL,ADMIN_TOTP_ISSUER,DO_SPACES_REGION,DO_SPACES_PUBLIC_URL,DO_SPACES_BUCKET,MONGO_DB_NAME,IPGEOLOCATION_API_KEY,OPEN_METEO_API_KEY"
